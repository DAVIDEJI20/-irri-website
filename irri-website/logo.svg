<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="globeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0E7C7B"/>
      <stop offset="50%" style="stop-color:#1B6B93"/>
      <stop offset="100%" style="stop-color:#0A2647"/>
    </linearGradient>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C8A84E"/>
      <stop offset="100%" style="stop-color:#E8D48B"/>
    </linearGradient>
    <linearGradient id="tealWave" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0E7C7B"/>
      <stop offset="100%" style="stop-color:#17A8A6"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A2647"/>
      <stop offset="50%" style="stop-color:#1B6B93"/>
      <stop offset="100%" style="stop-color:#0E7C7B"/>
    </linearGradient>
  </defs>

  <!-- Outer gold ring -->
  <circle cx="200" cy="175" r="135" fill="none" stroke="url(#ringGrad)" stroke-width="2.5" opacity="0.7"/>

  <!-- Globe -->
  <circle cx="200" cy="175" r="110" fill="url(#globeGrad)" opacity="0.9"/>

  <!-- Globe grid lines -->
  <ellipse cx="200" cy="175" rx="110" ry="40" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <ellipse cx="200" cy="175" rx="110" ry="75" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <ellipse cx="200" cy="175" rx="40" ry="110" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <ellipse cx="200" cy="175" rx="75" ry="110" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <line x1="90" y1="175" x2="310" y2="175" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <line x1="200" y1="65" x2="200" y2="285" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>

  <!-- Light reflection on globe -->
  <circle cx="165" cy="135" r="60" fill="rgba(255,255,255,0.06)"/>

  <!-- IRRI Text -->
  <text x="200" y="195" text-anchor="middle" font-family="Georgia, serif" font-size="72" font-weight="bold" fill="white" letter-spacing="6">IRRI</text>

  <!-- Teal wave accent -->
  <path d="M120,230 Q160,210 200,225 Q240,240 280,220" fill="none" stroke="url(#tealWave)" stroke-width="4" stroke-linecap="round"/>
  <path d="M130,245 Q170,225 210,240 Q250,255 290,235" fill="none" stroke="url(#tealWave)" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>

  <!-- Accessibility figure -->
  <g transform="translate(200, 305)" fill="url(#tealWave)">
    <!-- Head -->
    <circle cx="0" cy="-25" r="8"/>
    <!-- Body -->
    <path d="M0,-17 L0,5" stroke="url(#tealWave)" stroke-width="4" stroke-linecap="round" fill="none"/>
    <!-- Arms reaching up -->
    <path d="M-18,-10 Q-8,-18 0,-12 Q8,-18 18,-10" fill="none" stroke="url(#tealWave)" stroke-width="3.5" stroke-linecap="round"/>
    <!-- Legs -->
    <path d="M0,5 L-12,22" stroke="url(#tealWave)" stroke-width="3.5" stroke-linecap="round" fill="none"/>
    <path d="M0,5 L12,22" stroke="url(#tealWave)" stroke-width="3.5" stroke-linecap="round" fill="none"/>
    <!-- Wheelchair suggestion -->
    <path d="M-16,12 Q-18,22 -8,22 L8,22 Q18,22 16,12" fill="none" stroke="url(#tealWave)" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  </g>

  <!-- Bottom text -->
  <text x="200" y="360" text-anchor="middle" font-family="Arial, sans-serif" font-size="10.5" fill="#0A2647" letter-spacing="3.5" font-weight="600">INCLUSIVE REHABILITATION &amp;</text>
  <text x="200" y="375" text-anchor="middle" font-family="Arial, sans-serif" font-size="10.5" fill="#0A2647" letter-spacing="3.5" font-weight="600">REINTEGRATION INITIATIVE</text>

  <!-- Tagline -->
  <text x="200" y="396" text-anchor="middle" font-family="Georgia, serif" font-size="8" fill="#C8A84E" letter-spacing="1" font-style="italic">Reclaiming Dignity. Rebuilding Futures Through Inclusive Reintegration.</text>

  <!-- Decorative dots -->
  <circle cx="115" cy="355" r="2" fill="#C8A84E" opacity="0.5"/>
  <circle cx="120" cy="355" r="1.5" fill="#0E7C7B" opacity="0.5"/>
  <circle cx="280" cy="355" r="2" fill="#C8A84E" opacity="0.5"/>
  <circle cx="285" cy="355" r="1.5" fill="#0E7C7B" opacity="0.5"/>
</svg>
